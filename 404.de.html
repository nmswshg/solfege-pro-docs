<!DOCTYPE html>
<html lang="de"
      data-title-ja="ページが見つかりません (404) | ソルフェージュPRO"
      data-title-en="Page Not Found (404) | Solfege PRO"
      data-title-fr="Page introuvable (404) | Solfege PRO"
      data-title-de="Seite nicht gefunden (404) | Solfege PRO">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, follow">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seite nicht gefunden (404) | Solfege PRO</title>
    <meta name="description" content="お探しのページは見つかりませんでした。ガイド一覧や練習診断から目的のページをお探しください。">

    <link rel="icon" href="AppIcon.png" type="image/png">
    <link rel="apple-touch-icon" href="AppIcon.png">

    <meta property="og:title" content="Seite nicht gefunden (404)">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://nmswshg.github.io/solfege-pro-docs/og-image.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css?v=15">

    <style>
        .err-main {
            max-width: 600px;
            margin: 0 auto;
            padding: var(--space-3xl) var(--space-lg);
            text-align: center;
        }
        .err-code {
            font-size: 96px;
            font-weight: 700;
            color: var(--primary);
            line-height: 1;
            margin-bottom: var(--space-md);
            letter-spacing: -2px;
        }
        .err-title {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: var(--space-md);
        }
        .err-desc {
            color: var(--text-secondary);
            line-height: 1.7;
            margin-bottom: var(--space-xl);
        }
        .err-actions {
            display: flex;
            flex-direction: column;
            gap: var(--space-sm);
            max-width: 320px;
            margin: 0 auto;
        }
        .err-action {
            display: block;
            padding: var(--space-md) var(--space-lg);
            background: var(--surface);
            border: 1px solid var(--surface-light);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            text-decoration: none;
            transition: all 0.2s ease;
        }
        .err-action:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
            color: var(--text-primary);
        }
        .err-action--primary {
            background: var(--primary);
            color: var(--background) !important;
            border-color: var(--primary);
        }
    </style>
</head>
<body>
    <main class="err-main">
        <div class="err-code">404</div>
        <h1 class="err-title">
            
            
            
            Seite nicht gefunden
        </h1>
        <p class="err-desc">
            
            
            
            Die URL wurde möglicherweise geändert oder entfernt. Versuche eines der folgenden Ziele.
        </p>
        <nav class="err-actions">
            <a href="/solfege-pro-docs/" class="err-action err-action--primary">
                
                
                
                Zurück zur Startseite
            </a>
            <a href="/solfege-pro-docs/start-here.html" class="err-action">
                
                
                
                Wo anfangen? — 30-Sek-Diagnose
            </a>
            <a href="/solfege-pro-docs/guides/" class="err-action">
                
                
                
                Alle Leitfäden
            </a>
        </nav>
    </main>

    <script src="bootstrap.js" defer></script>
</body>
</html>
